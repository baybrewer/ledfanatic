<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pillar Control</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="manifest" href="/static/manifest.json">
</head>
<body>
  <div id="app">
    <!-- Status bar -->
    <header id="status-bar">
      <div class="status-left">
        <span id="connection-dot" class="dot disconnected"></span>
        <span id="fps-display">-- FPS</span>
      </div>
      <h1>Pillar</h1>
      <div class="status-right">
        <button id="blackout-btn" class="icon-btn" title="Blackout">⬛</button>
      </div>
    </header>

    <!-- Quick controls -->
    <section id="quick-controls">
      <div class="brightness-control">
        <label>Brightness</label>
        <input type="range" id="brightness-slider" min="0" max="100" value="80">
        <span id="brightness-value">80%</span>
      </div>
    </section>

    <!-- Tab navigation -->
    <nav id="tabs">
      <button class="tab active" data-tab="live">Live</button>
      <button class="tab" data-tab="effects">Effects</button>
      <button class="tab" data-tab="media">Media</button>
      <button class="tab" data-tab="audio">Audio</button>
      <button class="tab" data-tab="diag">Diag</button>
      <button class="tab" data-tab="system">System</button>
    </nav>

    <!-- Tab panels -->
    <main id="panels">

      <!-- LIVE -->
      <section id="panel-live" class="panel active">
        <div id="preview-container">
          <canvas id="preview-canvas" width="100" height="172"></canvas>
        </div>
        <div id="scene-info">
          <p>Scene: <strong id="current-scene-name">--</strong></p>
        </div>
        <div id="preset-grid" class="button-grid">
          <!-- Populated dynamically -->
        </div>
      </section>

      <!-- EFFECTS -->
      <section id="panel-effects" class="panel">
        <h2>Generative Effects</h2>
        <div id="effect-list" class="button-grid"></div>
        <h2>Audio-Reactive</h2>
        <div id="audio-effect-list" class="button-grid"></div>
        <div id="effect-params">
          <!-- Dynamic params UI -->
        </div>
      </section>

      <!-- MEDIA -->
      <section id="panel-media" class="panel">
        <div class="upload-area">
          <input type="file" id="media-upload" accept="image/*,video/*,.gif">
          <button id="upload-btn" class="action-btn">Upload Media</button>
          <div id="upload-progress" class="hidden">
            <progress id="upload-bar" max="100" value="0"></progress>
          </div>
        </div>
        <div id="media-library" class="button-grid">
          <!-- Populated dynamically -->
        </div>
      </section>

      <!-- AUDIO -->
      <section id="panel-audio" class="panel">
        <div class="audio-controls">
          <div class="control-group">
            <label>Input Device</label>
            <select id="audio-device-select"></select>
          </div>
          <div class="control-group">
            <label>Sensitivity</label>
            <input type="range" id="audio-sensitivity" min="0" max="200" value="100">
          </div>
          <div class="control-group">
            <label>Gain</label>
            <input type="range" id="audio-gain" min="0" max="300" value="100">
          </div>
          <button id="audio-start-btn" class="action-btn">Start Audio</button>
          <button id="audio-stop-btn" class="action-btn secondary">Stop Audio</button>
        </div>
        <div id="audio-meter">
          <div class="meter-bar" id="meter-bass"><span>Bass</span></div>
          <div class="meter-bar" id="meter-mid"><span>Mid</span></div>
          <div class="meter-bar" id="meter-high"><span>High</span></div>
        </div>
      </section>

      <!-- DIAGNOSTICS -->
      <section id="panel-diag" class="panel">
        <h2>Wiring Tests</h2>
        <div class="button-grid">
          <button class="test-btn" data-test="diag_strip_identify">Strip Identify</button>
          <button class="test-btn" data-test="diag_sweep">Bottom→Top Sweep</button>
          <button class="test-btn" data-test="diag_serpentine">Serpentine Chase</button>
          <button class="test-btn" data-test="diag_seam">Seam Test</button>
          <button class="test-btn" data-test="diag_channel_identify">Channel Identify</button>
          <button class="test-btn" data-test="diag_rgb_order">RGB Order</button>
        </div>
        <h2>Teensy Tests</h2>
        <div class="button-grid">
          <button class="test-btn" data-test="all_black">All Black</button>
          <button class="test-btn" data-test="all_white">All White</button>
          <button class="test-btn" data-test="heartbeat">Heartbeat</button>
        </div>
        <div id="diag-stats">
          <pre id="stats-output">Loading...</pre>
        </div>
      </section>

      <!-- SYSTEM -->
      <section id="panel-system" class="panel">
        <div class="system-info">
          <h2>System</h2>
          <div id="system-stats">
            <p>FPS Target: <select id="fps-select">
              <option value="30">30</option>
              <option value="60" selected>60</option>
              <option value="75">75</option>
              <option value="90">90</option>
            </select></p>
            <p>Transport: <span id="sys-transport">--</span></p>
            <p>Firmware: <span id="sys-firmware">--</span></p>
            <p>Frames Sent: <span id="sys-frames">--</span></p>
          </div>
          <div class="system-actions">
            <button id="restart-app-btn" class="action-btn secondary">Restart App</button>
            <button id="reboot-btn" class="action-btn danger">Reboot Pi</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
