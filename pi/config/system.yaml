# System configuration

network:
  ssid: "Pillar-Control"
  password: "pillar2026"
  ip: "192.168.4.1"
  hostname: "pillar"
  mdns: "pillar.local"

ui:
  port: 80
  dev_port: 8000

display:
  target_fps: 60
  brightness_cap: 0.8  # 0.0 - 1.0, safety limit
  gamma: 2.2
  startup_scene: "rainbow_rotate"

transport:
  baud: 115200  # ignored by Teensy USB serial, kept for pyserial
  reconnect_interval_ms: 1000
  handshake_timeout_ms: 3000
  frame_timeout_ms: 500

render:
  internal_width: 40  # supersampled width for smoother motion
  output_width: 10
  height: 172

logging:
  level: "INFO"
  max_log_size_mb: 10
  max_log_files: 5
