# Pixel map — single source of truth for LED geometry.
#
# 10-segment serpentine pillar: 10 columns x 172 rows.
# Even segments go up (bottom->top), odd segments go down (top->bottom).
# Paired on 5 OctoWS2811 outputs (0+1 on output 0, 2+3 on output 1, etc.)

schema_version: 2
origin: bottom-left

teensy:
  outputs: 8
  max_leds_per_output: 1200
  wire_order: BGR
  signal_family: ws281x_800khz
  octo_pins: [2, 14, 7, 8, 6, 20, 21, 5]

segments:
  # --- Output 0: segments 0 + 1 ---
  - start: [0, 0]
    end: [0, 171]
    output: 0
    color_order: BGR
  - start: [1, 171]
    end: [1, 0]
    output: 0
    color_order: BGR

  # --- Output 1: segments 2 + 3 ---
  - start: [2, 0]
    end: [2, 171]
    output: 1
    color_order: BGR
  - start: [3, 171]
    end: [3, 0]
    output: 1
    color_order: BGR

  # --- Output 2: segments 4 + 5 ---
  - start: [4, 0]
    end: [4, 171]
    output: 2
    color_order: BGR
  - start: [5, 171]
    end: [5, 0]
    output: 2
    color_order: BGR

  # --- Output 3: segments 6 + 7 ---
  - start: [6, 0]
    end: [6, 171]
    output: 3
    color_order: BGR
  - start: [7, 171]
    end: [7, 0]
    output: 3
    color_order: BGR

  # --- Output 4: segments 8 + 9 ---
  - start: [8, 0]
    end: [8, 171]
    output: 4
    color_order: BGR
  - start: [9, 171]
    end: [9, 0]
    output: 4
    color_order: BGR
